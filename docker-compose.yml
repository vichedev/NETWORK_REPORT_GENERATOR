services:
  report-generator:
    build: .
    container_name: redcom-reports-safe
    # Mapeamos tu puerto deseado 8888 al puerto interno 8080 del Nginx non-root
    ports:
      - "8888:8080"
    environment:
      - VITE_GROQ_API_KEY=${VITE_GROQ_API_KEY}
    networks:
      - network_reports_bridge
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always

networks:
  network_reports_bridge:
    driver: bridge
    ipam:
      config:
        # Forzamos un pool de IPs que no choque con tus redes de ISP
        - subnet: 172.99.0.0/24